<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>The Best Pets</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="{{ url_for('static', filename='stylesheets/style.css') }}" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.4.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="content-container">
      <div id="content-container-center">
        <h3>Cats vs Dogs!</h3>
        <div class="cards">
          <form method="POST" action="/">
            <div class="card cat {% if vote == 'a' %}voted{% endif %}">
              <div class="card-image">
                <img class="pet-photo" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=600&q=80" alt="Beautiful cat" onerror="this.style.display='none'" />
                <span class="pet-emoji">🐱</span>
                <div class="voted-badge">✓ Your vote</div>
              </div>
              <div class="card-body">
                <h2>Cats</h2>
                <p class="tagline">Independent, mysterious, and secretly in charge</p>
                <button type="submit" name="vote" value="a" class="vote-btn a" {% if vote == 'a' %}disabled{% endif %}>
                  {% if vote == 'a' %}Cats ✓{% else %}Vote for Cats{% endif %}
                </button>
              </div>
            </div>
          </form>
          <form method="POST" action="/">
            <div class="card dog {% if vote == 'b' %}voted{% endif %}">
              <div class="card-image">
                <img class="pet-photo" src="https://images.unsplash.com/photo-1552053831-71594a27632d?w=600&q=80" alt="Good dog" onerror="this.style.display='none'" />
                <span class="pet-emoji">🐶</span>
                <div class="voted-badge">✓ Your vote</div>
              </div>
              <div class="card-body">
                <h2>Dogs</h2>
                <p class="tagline">Loyal, joyful, and the goodest boys & girls</p>
                <button type="submit" name="vote" value="b" class="vote-btn b" {% if vote == 'b' %}disabled{% endif %}>
                  {% if vote == 'b' %}Dogs ✓{% else %}Vote for Dogs{% endif %}
                </button>
              </div>
            </div>
          </form>
        </div>
        <p class="tip">(Tip: you can change your vote)</p>
        <p class="hostname">Processed by container ID {{ hostname }}</p>
      </div>
    </div>
    <div class="confetti-container" id="confetti"></div>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
    <script>
      function launchConfetti(color) {
        const container = document.getElementById('confetti');
        container.innerHTML = '';
        const colors = [color, '#ddf0fd', '#fff', '#ccf7f7'];
        for (let i = 0; i < 40; i++) {
          const piece = document.createElement('div');
          piece.classList.add('confetti-piece');
          piece.style.left = Math.random() * 100 + 'vw';
          piece.style.top = '-20px';
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          piece.style.width = (6 + Math.random() * 8) + 'px';
          piece.style.height = (6 + Math.random() * 8) + 'px';
          piece.style.animationDelay = (Math.random() * 0.4) + 's';
          piece.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
          container.appendChild(piece);
        }
        setTimeout(() => container.innerHTML = '', 2000);
      }
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          launchConfetti(this.classList.contains('a') ? '#1aaaf8' : '#00cbca');
        });
      });
    </script>
    {% if vote %}
    <script>
      launchConfetti("{{ vote }}" === 'a' ? '#1aaaf8' : '#00cbca');
    </script>
    {% endif %}
  </body>
</html>
