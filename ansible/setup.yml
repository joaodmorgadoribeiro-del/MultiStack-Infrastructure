---
# ─────────────────────────────────────────────────────────────────────────────
# INSTALL DOCKER ON ALL INSTANCES
# ─────────────────────────────────────────────────────────────────────────────
- name: Prepare all instances with Docker
  hosts: all
  become: true
  tasks:
    - name: Update apt and install Docker
      apt:
        name:
          - docker.io
          - python3-pip
        state: present
        update_cache: yes
 
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
 
    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
 
# ─────────────────────────────────────────────────────────────────────────────
# DATABASE INSTANCE - PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
- name: Deploy PostgreSQL
  hosts: database
  become: true
  tasks:
    - name: Create db-network
      docker_network:
        name: db-network
        state: present
 
    - name: Create pgdata volume
      docker_volume:
        name: pgdata-joao-irene
 
    - name: Run Postgres Container
      docker_container:
        name: db
        image: postgres:15-alpine
        state: started
        restart_policy: always
        networks:
          - name: db-network
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: "postgres"
          POSTGRES_PASSWORD: "password"
          POSTGRES_DB: "postgres"
        volumes:
          - pgdata-joao-irene:/var/lib/postgresql/data
 
# ─────────────────────────────────────────────────────────────────────────────
# BACKEND INSTANCE - Redis + Worker
# ─────────────────────────────────────────────────────────────────────────────
- name: Deploy Backend Services
  hosts: backend
  become: true
  tasks:
    - name: Create back-network
      docker_network:
        name: back-network
        state: present
 
    - name: Run Redis Container
      docker_container:
        name: redis
        image: redis:alpine
        state: started
        restart_policy: always
        networks:
          - name: back-network
        ports:
          - "6379:6379"
 
    - name: Run Worker Container (.NET)
      docker_container:
        name: worker
        image: ireneromero95/worker:latest
        state: started
        restart_policy: always
        networks:
          - name: back-network
        env:
          REDIS_HOST: "redis"
          DB_HOST: "{{ hostvars['db-instance-1']['private_ip'] }}"
          DB_USER: "postgres"
          DB_PASSWORD: "password"
          DB_NAME: "postgres"
 
# ─────────────────────────────────────────────────────────────────────────────
# VOTE INSTANCE - Vote App (Python/Flask)
# ─────────────────────────────────────────────────────────────────────────────
- name: Deploy Vote App
  hosts: vote
  become: true
  tasks:
    - name: Create vote-network
      docker_network:
        name: vote-network
        state: present
 
    - name: Run Vote App (Python)
      docker_container:
        name: vote
        image: ireneromero95/vote:latest
        state: started
        recreate: yes
        restart_policy: always
        networks:
          - name: vote-network
        ports:
          - "5000:80"
        env:
          REDIS_HOST: "{{ hostvars['backend-instance-1']['private_ip'] }}"
 
# ─────────────────────────────────────────────────────────────────────────────
# RESULT INSTANCE - Result App (Node.js)
# ─────────────────────────────────────────────────────────────────────────────
- name: Deploy Result App
  hosts: result
  become: true
  tasks:
    - name: Create result-network
      docker_network:
        name: result-network
        state: present
 
    - name: Run Result App (Node.js)
      docker_container:
        name: result
        image: ireneromero95/result:latest
        state: started
        recreate: yes
        restart_policy: always
        networks:
          - name: result-network
        ports:
          - "4000:80"
        env:
          PG_HOST: "{{ hostvars['db-instance-1']['private_ip'] }}"
          PG_PORT: "5432"
          PG_USER: "postgres"
          PG_PASSWORD: "password"
          PG_DATABASE: "postgres"
 




